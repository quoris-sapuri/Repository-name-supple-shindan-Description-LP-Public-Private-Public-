<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの肌タイプ診断 | サプリ診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #D4537E;
    --pink-light: #FBEAF0;
    --pink-mid: #F4C0D1;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --gray: #5F5E5A;
    --gray-light: #F5F4F0;
    --text: #1a1a1a;
    --text-mid: #555;
    --text-light: #999;
    --white: #fff;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #faf9f7;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== TOP LP ===== */
  #page-top {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .top-hero {
    background: #FFFBF0;
    padding: 40px 22px 32px;
    text-align: center;
  }
  .hero-label {
    display: inline-block;
    background: #FFD166;
    color: #7A5200;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
  }
  .hero-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 30px;
    font-weight: 800;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hero-title span { color: #FF6B6B; }
  .hero-sub {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.75;
    margin-bottom: 0;
  }

  .top-content {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex: 1;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--text-light);
    margin-bottom: 12px;
  }
  .worry-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .worry-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
  }
  .worry-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FF6B6B;
    flex-shrink: 0;
  }
  .types-preview {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .type-card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    text-align: center;
  }
  .type-card-emoji { font-size: 22px; margin-bottom: 4px; }
  .type-card-name { font-size: 11px; font-weight: 700; color: var(--text); }
  .type-card-sub { font-size: 10px; color: var(--text-light); margin-top: 2px; }

  .top-cta {
    padding: 0 20px 40px;
  }
  .btn-start {
    width: 100%;
    background: #FF6B6B;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .04em;
    transition: opacity .15s, transform .1s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-start:hover { opacity: .9; }
  .btn-start:active { transform: scale(.98); }
  .start-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* ===== QUIZ ===== */
  #page-quiz {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .quiz-header {
    padding: 14px 20px 10px;
    background: #fff;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .quiz-step { font-size: 12px; color: var(--text-light); }
  .quiz-section-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .quiz-time { font-size: 12px; color: var(--text-light); }
  .progress-track {
    height: 4px;
    background: #eee;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }

  .quiz-body {
    flex: 1;
    padding: 28px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .quiz-q {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice-btn {
    width: 100%;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all .12s;
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.5;
  }
  .choice-btn:hover { border-color: var(--pink); background: var(--pink-light); }
  .choice-btn.selected { border-color: var(--pink); background: var(--pink-light); color: #72243E; font-weight: 500; border-width: 2px; }

  .quiz-nav {
    padding: 12px 20px 28px;
    background: #fff;
    border-top: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .btn-back {
    font-size: 14px;
    color: var(--text-light);
    cursor: pointer;
    padding: 8px 0;
    background: none;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-next {
    background: var(--pink);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-next:disabled { opacity: .3; cursor: not-allowed; }

  /* ===== RESULT ===== */
  #page-result {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .result-hero {
    padding: 40px 24px 32px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .result-animal {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    border: 3px solid transparent;
    animation: popIn .5s ease;
  }
  @keyframes popIn {
    0% { transform: scale(.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .result-type-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    font-weight: 600;
  }
  .result-type-pill {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 20px;
  }
  .result-empathy {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.85;
    text-align: center;
    white-space: pre-line;
  }
  .result-trust {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 24px;
    background: #fff;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
  }
  .trust-item { text-align: center; }
  .trust-num { font-size: 20px; font-weight: 700; color: var(--text); }
  .trust-lbl { font-size: 11px; color: var(--text-light); }

  .result-cause {
    margin: 20px;
    background: var(--gray-light);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .result-cause-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .result-cause-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
  }

  .result-timeline {
    margin: 0 20px 20px;
  }
  .timeline-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 14px;
    text-align: center;
  }
  .tl-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .tl-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .tl-line {
    width: 1.5px;
    flex: 1;
    min-height: 14px;
    background: #e0e0e0;
    margin-top: 3px;
  }
  .tl-week { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .tl-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

  .result-cta {
    padding: 16px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-product {
    width: 100%;
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s;
  }
  .btn-product:hover { opacity: .9; }
  .result-social {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
  }

  /* ===== PRODUCT PAGE ===== */
  #page-product {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .product-header {
    padding: 14px 20px;
    background: #fff;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .back-btn {
    font-size: 13px;
    color: var(--text-light);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .product-header-title { font-size: 14px; font-weight: 700; }
  .product-body {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .product-type-banner {
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--pink-light);
  }
  .product-type-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .product-type-text { font-size: 13px; font-weight: 700; color: #72243E; }
  .product-type-sub { font-size: 12px; color: #993556; }

  .tab-row {
    display: flex;
    border: 1.5px solid #e0e0e0;
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    background: #fff;
    border: none;
    color: var(--text-light);
    transition: all .15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .tab-btn.on { background: var(--pink); color: #fff; font-weight: 700; }

  .tab-note { font-size: 11px; color: var(--text-light); text-align: center; }

  .plan-card {
    border: 1.5px solid #e0e0e0;
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    background: #fff;
    margin-top: 10px;
  }
  .plan-card.featured { border-color: var(--pink); background: var(--pink-light); }
  .plan-card.selected { border-width: 2px; }
  .plan-badge {
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 14px;
    border-radius: 20px;
    color: #fff;
    white-space: nowrap;
  }
  .plan-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .plan-name { font-size: 15px; font-weight: 700; }
  .plan-role { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .radio-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .radio-dot { width: 10px; height: 10px; border-radius: 50%; }
  .plan-price-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    margin-bottom: 6px;
  }
  .plan-price { font-size: 24px; font-weight: 700; }
  .plan-unit { font-size: 12px; color: var(--text-light); }
  .plan-orig { font-size: 12px; color: var(--text-light); text-decoration: line-through; }
  .plan-save {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .plan-period { font-size: 11px; color: var(--text-light); margin-bottom: 10px; }
  .plan-items { display: flex; flex-direction: column; gap: 5px; }
  .plan-item {
    font-size: 13px;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .item-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .voice-box {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,.7);
    border-radius: var(--radius-sm);
    border-top: 1px solid rgba(0,0,0,.06);
  }
  .voice-txt { font-size: 12px; color: var(--text-mid); line-height: 1.6; font-style: italic; }
  .voice-by { font-size: 11px; color: var(--text-light); margin-top: 3px; }

  .guarantee-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 8px 0;
  }
  .g-item { font-size: 11px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }

  .product-footer {
    padding: 12px 20px 32px;
    background: #fff;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }
  .btn-buy {
    width: 100%;
    border: none;
    border-radius: var(--radius);
    padding: 17px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s;
  }
  .btn-buy:hover { opacity: .9; }
  .btn-sub-link {
    width: 100%;
    background: none;
    border: none;
    font-size: 13px;
    color: var(--text-light);
    cursor: pointer;
    margin-top: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: center;
  }

  /* Utilities */
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ===== TOP LP ===== -->
<div id="page-top">
  <div class="top-hero">
    <div class="hero-label">✨ 無料 · 2分でわかる</div>
    <h1 class="hero-title">サプリ選びに<br>困っている<br><span>あなたへ。</span></h1>
    <p class="hero-sub">今の自分、<span style="font-weight:700;color:#FF6B6B">何タイプ</span>か知ってる？<br>疲れ・肌・気分・体型…<br>ぜんぶつながってる理由、教えます。</p>
  </div>

  <div class="top-content">
    <div>
      <div class="section-label">診断で分かる4タイプ</div>
      <div class="types-preview">
        <div class="type-card">
          <div class="type-card-emoji">🐰</div>
          <div class="type-card-name">ウサギ</div>
          <div class="type-card-sub">がんばりすぎ</div>
        </div>
        <div class="type-card">
          <div class="type-card-emoji">🐻</div>
          <div class="type-card-name">クマ</div>
          <div class="type-card-sub">つかれすぎ</div>
        </div>
        <div class="type-card">
          <div class="type-card-emoji">🐱</div>
          <div class="type-card-name">ネコ</div>
          <div class="type-card-sub">ゆらぎすぎ</div>
        </div>
        <div class="type-card">
          <div class="type-card-emoji">🦥</div>
          <div class="type-card-name">ナマケモノ</div>
          <div class="type-card-sub">たまりすぎ</div>
        </div>
      </div>
    </div>

    <div class="worry-section">
      <div class="section-label">こんな悩み、ありませんか？</div>
      <div class="worry-list">
        <div class="worry-item"><div class="worry-dot"></div>ちゃんとケアしてるのに変わらない</div>
        <div class="worry-item"><div class="worry-dot"></div>寝ても疲れが取れない・朝から重だるい</div>
        <div class="worry-item"><div class="worry-dot"></div>気分の波が激しくてイライラしやすい</div>
        <div class="worry-item"><div class="worry-dot"></div>食べていないのに体型が変わらない</div>
      </div>
    </div>
  </div>

  <div class="top-cta">
    <button class="btn-start" onclick="startQuiz()">診断してみる →</button>
    <div class="start-note">登録不要・完全無料・所要時間約2分</div>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="page-quiz" class="hidden">
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="quiz-step" id="quiz-step">Q1 / 15</span>
      <span class="quiz-section-tag" id="quiz-section-tag"></span>
      <span class="quiz-time" id="quiz-time">残り約2分</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:6.7%"></div>
    </div>
  </div>

  <div class="quiz-body">
    <div class="quiz-q" id="quiz-q"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="quiz-nav">
    <button class="btn-back" id="btn-back" onclick="goBack()">← 戻る</button>
    <button class="btn-next" id="btn-next" onclick="goNext()" disabled>次へ</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="page-result" class="hidden">
  <div class="result-hero" id="result-hero"></div>
  <div class="result-trust">
    <div class="trust-item"><div class="trust-num" id="trust-count">3,200</div><div class="trust-lbl">同じタイプ</div></div>
    <div class="trust-item"><div class="trust-num">87%</div><div class="trust-lbl">継続率</div></div>
    <div class="trust-item"><div class="trust-num">4.8</div><div class="trust-lbl">★ 評価</div></div>
  </div>
  <div class="result-cause" id="result-cause"></div>
  <div class="result-timeline" id="result-timeline"></div>
  <div class="result-cta" id="result-cta"></div>
</div>

<!-- ===== PRODUCT ===== -->
<div id="page-product" class="hidden">
  <div class="product-header">
    <button class="back-btn" onclick="showPage('result')">← 診断結果</button>
    <div class="product-header-title" id="product-header-title">プランを選ぶ</div>
    <div style="width:60px"></div>
  </div>
  <div class="product-body" id="product-body"></div>
  <div class="product-footer" id="product-footer"></div>
</div>

<script>
// ===== DATA =====
const QUESTIONS = [
  { sec:'悩み把握', secColor:'#D4537E', secBg:'#FBEAF0',
    q:'今いちばん気になるのは？',
    cs:['肌のこと','疲れやだるさ','気分やメンタル','体型・むくみ'],
    sc:{usagi:2,kuma:1,neko:1,namake:1} },
  { sec:'悩み把握', secColor:'#D4537E', secBg:'#FBEAF0',
    q:'最近感じる不調は？',
    cs:['肌荒れ・ゆらぎ','だるい・重い','イライラ・不安','むくみ・冷え'],

let cur = 0;
let answers = Array(15).fill(null);
let currentType = null;

// ===== PAGES =====
function showPage(id) {
  ['page-top','page-quiz','page-result','page-product'].forEach(p => {
    document.getElementById(p).classList.toggle('hidden', p !== 'page-' + id);
  });
  window.scrollTo(0,0);
}

// ===== QUIZ =====
function startQuiz() { cur = 0; answers = Array(15).fill(null); renderQuiz(); showPage('quiz'); }

function renderQuiz() {
  const q = QUESTIONS[cur];
  document.getElementById('quiz-step').textContent = `Q${cur+1} / 15`;
  document.getElementById('progress-fill').style.width = ((cur+1)/15*100).toFixed(1) + '%';
  document.getElementById('progress-fill').style.background = q.secColor;
  const tag = document.getElementById('quiz-section-tag');
  tag.textContent = q.sec;
  tag.style.cssText = `background:${q.secBg};color:${q.secColor};font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px`;
  const rem = Math.max(1, Math.ceil((15 - cur) * 3 / 60));
  document.getElementById('quiz-time').textContent = cur < 14 ? `残り約${rem}分` : '最後の質問';
  document.getElementById('btn-back').style.visibility = cur === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').style.background = q.secColor;
  document.getElementById('btn-next').disabled = answers[cur] === null;
  document.getElementById('quiz-q').textContent = q.q;
  const wrap = document.getElementById('choices');
  wrap.innerHTML = '';
  q.cs.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (answers[cur] === i ? ' selected' : '');
    btn.textContent = c;
    if (answers[cur] === i) { btn.style.borderColor = q.secColor; btn.style.background = q.secBg; btn.style.color = q.secColor; }
    btn.onclick = () => {
      answers[cur] = i;
      document.querySelectorAll('.choice-btn').forEach(b => { b.classList.remove('selected'); b.style.borderColor=''; b.style.background=''; b.style.color=''; });
      btn.classList.add('selected');
      btn.style.cssText = `border-color:${q.secColor};background:${q.secBg};color:${q.secColor};border-width:2px`;
      document.getElementById('btn-next').disabled = false;
    };
    wrap.appendChild(btn);
  });
}

function goNext() { if (answers[cur] === null) return; cur++; if (cur >= 15) { calcResult(); } else { renderQuiz(); } }
function goBack() { if (cur === 0) return; cur--; renderQuiz(); }

// ===== RESULT =====
function calcResult() {
  const scores = { usagi:0, kuma:0, neko:0, namake:0 };
  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] === null) return;
    const keys = Object.keys(q.sc);
    const vals = Object.values(q.sc);
    const i = answers[qi];
    const key = keys[Math.min(i, keys.length-1)];
    if (scores[key] !== undefined) scores[key] += vals[Math.min(i, vals.length-1)];
  });
  currentType = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  renderResult();
  showPage('result');
}

function renderResult() {
  const t = TYPES[currentType];
  document.getElementById('trust-count').textContent = t.trust;

  const hero = document.getElementById('result-hero');
  hero.style.background = `linear-gradient(160deg, ${t.bg} 0%, #fff 70%)`;
  hero.innerHTML = `

    <div class="result-type-name" style="color:${t.textColor}">${t.name}</div>
    <div class="result-type-pill" style="background:${t.bg};color:${t.color}">${t.pill}</div>
    <div class="result-empathy">${t.empathy}</div>

  const cause = document.getElementById('result-cause');
  cause.innerHTML = `<div class="result-cause-label">根本的な原因</div><div class="result-cause-text">${t.cause}</div>`;

  const tl = document.getElementById('result-timeline');
  tl.innerHTML = `<div class="timeline-title">続けるとどう変わる？</div>` +
    TIMELINE.map((item, i) => `
      <div class="tl-item">
        <div class="tl-left">
          <div class="tl-dot" style="background:${item.bg};color:${item.color}">${i+1}</div>
          ${i < TIMELINE.length-1 ? '<div class="tl-line"></div>' : ''}
        </div>
        <div style="padding-bottom:14px">
          <div class="tl-week" style="color:${item.color}">${item.week}</div>
          <div class="tl-text">${item.text}</div>
        </div>
      </div>
    `).join('');

  const cta = document.getElementById('result-cta');
  cta.innerHTML = `
    <button class="btn-product" style="background:${t.color}" onclick="showProductPage()">あなたに合うサプリを見る →</button>
    <div class="result-social">同じタイプの方が続々と改善中</div>
  `;
}
